<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RBGB's Office Task Board</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="lock-screen" class="lock-screen">
    <div class="lock-card">
      <h1>RBGB's Office Board</h1>
      <p>Enter the office passcode to continue.</p>

      <input id="user-name-input" type="text" placeholder="Your name e.g. Joseph" />
      <input id="passcode-input" type="password" placeholder="Enter passcode" />
      <button id="unlock-button">Enter</button>

      <p id="passcode-error" class="error-message"></p>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div>
        <h2>Office Board</h2>
        <p>Tasks, issues, comments, and progress.</p>
      </div>

      <nav>
        <button class="nav-item active" data-filter="all">All Tasks</button>
        <button class="nav-item" data-filter="todo">To Do</button>
        <button class="nav-item" data-filter="in-progress">In Progress</button>
        <button class="nav-item" data-filter="waiting">Waiting</button>
        <button class="nav-item" data-filter="blocked">Blocked</button>
        <button class="nav-item" data-filter="done">Done</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Task Dashboard</h1>
          <p>Shared workspace for daily office work.</p>
        </div>

        <div class="topbar-actions">
          <select id="project-filter">
            <option value="all">All Projects</option>
          </select>

          <select id="task-sort">
            <option value="newest">Newest First</option>
            <option value="due-date">Due Date</option>
            <option value="priority">Priority</option>
          </select>

          <button id="open-task-modal" class="primary-button">+ New Task</button>
        </div>
      </header>

      <section class="stats">
        <div class="stat-card">
          <span id="total-count">0</span>
          <p>Total Tasks</p>
        </div>

        <div class="stat-card">
          <span id="progress-count">0</span>
          <p>In Progress</p>
        </div>

        <div class="stat-card">
          <span id="waiting-count">0</span>
          <p>Waiting</p>
        </div>

        <div class="stat-card">
          <span id="blocked-count">0</span>
          <p>Blocked</p>
        </div>
      </section>

      <section id="task-list" class="task-list"></section>
    </main>
  </div>

  <div id="task-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>New Task</h2>
        <button id="close-task-modal" class="icon-button">×</button>
      </div>

      <input id="task-title" placeholder="Task title" />

      <textarea id="task-description" placeholder="Task description"></textarea>

      <div class="form-grid">
        <div>
          <label>Due date</label>
          <input id="task-due-date" type="date" />
        </div>

        <div>
          <label>Status</label>
          <select id="task-status">
            <option value="todo">To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="waiting">Waiting</option>
            <option value="blocked">Blocked</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div>
          <label>Priority</label>
          <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div>
          <label>Assigned to</label>
          <input id="task-assigned-to" placeholder="Joseph / Jeff / Other" />
        </div>

        <div>
          <label>Project</label>
          <input id="task-project" placeholder="Keystone / Spelman / Non-Billable" />
        </div>
      </div>

      <button id="save-task" class="primary-button full-width">Save Task</button>
    </div>
  </div>

  <div id="detail-panel" class="detail-panel hidden">
    <div class="detail-card">
      <button id="close-detail-panel" class="icon-button">×</button>

      <label>Task title</label>
      <input id="detail-title-input" />

      <label>Description</label>
      <textarea id="detail-description-input"></textarea>

      <div class="form-grid">
        <div>
          <label>Due date</label>
          <input id="detail-due-date-input" type="date" />
        </div>

        <div>
          <label>Status</label>
          <select id="detail-status-select">
            <option value="todo">To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="waiting">Waiting</option>
            <option value="blocked">Blocked</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div>
          <label>Priority</label>
          <select id="detail-priority-select">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div>
          <label>Assigned to</label>
          <input id="detail-assigned-to-input" />
        </div>

        <div>
          <label>Project</label>
          <input id="detail-project-input" />
        </div>
      </div>

      <button id="save-task-edits" class="secondary-button">Save Task Changes</button>
      <button id="delete-task" class="danger-button">Delete Task</button>

      <hr />

      <h3>Comments</h3>
      <div id="comments-list" class="comments-list"></div>

      <textarea id="comment-input" placeholder="Add a comment..."></textarea>
      <button id="save-comment" class="primary-button full-width">Add Comment</button>
    </div>
  </div>

  <script type="module" src="script.js?v=2.0"></script>
</body>
</html>
